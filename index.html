<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Crypto Trading Bot Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <!-- Sidebar for authentication -->
  <div class="sidebar">
    <h2>🔐 User Authentication</h2>
    <select id="menu">
      <option>Login</option>
      <option>Register</option>
    </select>
    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">Login</button>
  </div>

  <!-- Main dashboard -->
  <div class="main">
    <h1>🤖 Crypto Trading Bot Dashboard</h1>

    <h2>📈 Market Data</h2>
    <select id="symbol" onchange="fetchData()">
      <option value="BTCUSDT">BTC/USDT</option>
      <option value="ETHUSDT">ETH/USDT</option>
      <option value="BNBUSDT">BNB/USDT</option>
    </select>
    <select id="timeframe" onchange="fetchData()">
      <option value="1h">1 Hour</option>
      <option value="1d">1 Day</option>
      <option value="1w">1 Week</option>
      <option value="1M">1 Month</option>
      <option value="1y">1 Year</option>
    </select>
    <p id="price">Latest Price: --</p>
    <canvas id="chart" width="600" height="300"></canvas>

    <h2>💼 Portfolio Tracker</h2>
    <input type="number" id="btc" placeholder="BTC amount">
    <input type="number" id="eth" placeholder="ETH amount">
    <input type="number" id="bnb" placeholder="BNB amount">
    <button onclick="calcPortfolio()">Calculate Value</button>
    <p id="portfolio">Total Value: -- USDT</p>

    <h2>💳 Deposit INR</h2>
    <input type="number" id="deposit" placeholder="Enter deposit amount (INR)">
    <select id="payment">
      <option>PhonePe (UPI)</option>
      <option>Net Banking</option>
      <option>Debit/Credit Card</option>
    </select>
    <button onclick="depositINR()">Pay Now</button>
    <p id="depositResult"></p>

    <h2>⚠️ Price Alerts</h2>
    <input type="number" id="alertPrice" placeholder="Set alert price">
    <button onclick="setAlert()">Set Alert</button>
    <p id="alertResult"></p>

    <h2>💵 Real Trading (Simulation)</h2>
    <select id="tradeAction">
      <option value="None">None</option>
      <option value="BUY">Buy Portfolio</option>
      <option value="SELL">Sell Portfolio</option>
    </select>
    <button onclick="placeOrder()">Execute Trade</button>

    <h2>📊 Transaction History</h2>
    <table border="1" id="tradeTable">
      <tr><th>Symbol</th><th>Side</th><th>Amount</th><th>Price</th><th>Status</th></tr>
    </table>
  </div>

  <script src="script.js"></script>
</body>
</html>
